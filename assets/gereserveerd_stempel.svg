<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <!-- Inner circular background -->
  <circle cx="150" cy="150" r="120" fill="#ffffff" fill-opacity="0.95" />
  
  <!-- Thick outer border -->
  <circle cx="150" cy="150" r="112" fill="none" stroke="#f39223" stroke-width="6" />
  
  <!-- Thin inner border -->
  <circle cx="150" cy="150" r="102" fill="none" stroke="#f39223" stroke-width="2" />
  
  <!-- Center banner with GERESERVEERD -->
  <g transform="rotate(-15 150 150)">
    <rect x="25" y="115" width="250" height="70" rx="8" fill="#f39223" />
    <text x="150" y="159" fill="#ffffff" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="22" text-anchor="middle" letter-spacing="1">GERESERVEERD</text>
  </g>
</svg>
