<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <!-- Inner circular background -->
  <circle cx="150" cy="150" r="120" fill="#ffffff" fill-opacity="0.95" />
  
  <!-- Outer thin green border -->
  <circle cx="150" cy="150" r="112" fill="none" stroke="#1b5e20" stroke-width="5" />
  
  <!-- Inner thin green border -->
  <circle cx="150" cy="150" r="76" fill="none" stroke="#1b5e20" stroke-width="5" />
  
  <!-- Text paths R=86 and R=102 -->
  <path id="text-path-top" d="M 64,150 A 86,86 0 0,1 236,150" fill="none" />
  <path id="text-path-bottom" d="M 48,150 A 102,102 0 0,0 252,150" fill="none" />
  
  <!-- Outer text VERKOCHT -->
  <text fill="#1b5e20" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="22" letter-spacing="4.0">
    <textPath href="#text-path-top" startOffset="50%" text-anchor="middle">
      VERKOCHT
    </textPath>
  </text>
  
  <text fill="#1b5e20" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="22" letter-spacing="4.0">
    <textPath href="#text-path-bottom" startOffset="50%" text-anchor="middle">
      VERKOCHT
    </textPath>
  </text>
  
  <!-- Bullets/Dots separating top and bottom text -->
  <circle cx="59.2" cy="174.3" r="6" fill="#f39223" stroke="#1b5e20" stroke-width="1.5" />
  <circle cx="240.8" cy="174.3" r="6" fill="#f39223" stroke="#1b5e20" stroke-width="1.5" />
  
  <!-- Center banner with VERKOCHT -->
  <g transform="rotate(-15 150 150)">
    <rect x="30" y="115" width="240" height="70" rx="8" fill="#1b5e20" />
    <text x="150" y="165" fill="#ffffff" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="34" text-anchor="middle" letter-spacing="2">VERKOCHT</text>
  </g>
</svg>
