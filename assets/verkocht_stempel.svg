<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <!-- Inner circular background -->
  <circle cx="150" cy="150" r="120" fill="#ffffff" fill-opacity="0.95" />
  
  <!-- Thick outer border -->
  <circle cx="150" cy="150" r="112" fill="none" stroke="#1b5e20" stroke-width="6" />
  
  <!-- Thin inner border -->
  <circle cx="150" cy="150" r="102" fill="none" stroke="#1b5e20" stroke-width="2" />
  
  <!-- Center banner with VERKOCHT -->
  <g transform="rotate(-15 150 150)">
    <rect x="35" y="115" width="230" height="70" rx="8" fill="#1b5e20" />
    <text x="150" y="161" fill="#ffffff" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="30" text-anchor="middle" letter-spacing="1.5">VERKOCHT</text>
  </g>
</svg>
